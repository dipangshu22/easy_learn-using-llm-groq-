<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocMind — Ask Your Documents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --border-bright: #3d3d3d;
    --accent: #e87c32;
    --accent-dim: #b05f20;
    --accent-glow: rgba(232,124,50,0.15);
    --text: #e8e4de;
    --text-dim: #7a7570;
    --text-muted: #4a4540;
    --user-bubble: #1f1a14;
    --ai-bubble: #141414;
    --success: #4caf82;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'Lora', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }
  .model-badge {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Left Panel ── */
  .panel-left {
    width: 320px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow-y: auto;
  }
  .panel-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .section-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .tabs { display: flex; gap: 4px; margin-bottom: 14px; }
  .tab {
    flex: 1;
    padding: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-display);
    font-size: 0.72rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.2s;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #0d0d0d; }
  .tab:hover:not(.active) { border-color: var(--border-bright); color: var(--text); }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-text { font-family: var(--font-display); font-size: 0.8rem; font-weight: 600; color: var(--text-dim); }
  .upload-sub  { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-muted); margin-top: 4px; }

  .text-input-area {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.82rem;
    line-height: 1.7;
    padding: 12px;
    border-radius: 6px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color 0.2s;
  }
  .text-input-area:focus { border-color: var(--accent); }

  .doc-status {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(76,175,130,0.08);
    border: 1px solid rgba(76,175,130,0.2);
    border-radius: 6px;
    margin-top: 12px;
  }
  .doc-status.visible { display: flex; }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { font-family: var(--font-mono); font-size: 0.65rem; color: var(--success); }

  .doc-stats { display: flex; gap: 10px; margin-top: 10px; }
  .stat {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    text-align: center;
  }
  .stat-num  { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--accent); }
  .stat-label{ font-family: var(--font-mono); font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

  .load-btn {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    border: none;
    color: #0d0d0d;
    font-family: var(--font-display);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.2s, transform 0.1s;
  }
  .load-btn:hover { background: #f08d40; }
  .load-btn:active { transform: scale(0.98); }

  /* ── Right Panel ── */
  .panel-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
    padding: 40px;
  }
  .empty-icon  { font-size: 3rem; opacity: 0.3; }
  .empty-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--text-dim); }
  .empty-sub   { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); line-height: 1.8; max-width: 360px; }

  .msg { display: flex; gap: 14px; animation: fadeUp 0.3s ease; max-width: 820px; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; flex-shrink: 0;
    font-family: var(--font-display); font-weight: 700;
  }
  .msg.user .msg-avatar { background: var(--accent); color: #0d0d0d; }
  .msg.ai   .msg-avatar { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }
  .msg-bubble {
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.88rem;
    line-height: 1.8;
    max-width: 680px;
  }
  .msg.user .msg-bubble { background: var(--user-bubble); border: 1px solid var(--border); border-top-right-radius: 2px; }
  .msg.ai   .msg-bubble { background: var(--ai-bubble);   border: 1px solid var(--border); border-top-left-radius:  2px; }

  .typing-indicator { display: flex; gap: 5px; padding: 4px 0; align-items: center; }
  .dot { width:7px; height:7px; background:var(--accent); border-radius:50%; animation:bounce 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.5} 30%{transform:translateY(-6px);opacity:1} }

  .chat-input-area {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.88rem;
    padding: 12px 16px;
    border-radius: 8px;
    outline: none;
    resize: none;
    max-height: 140px;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .send-btn {
    width: 44px; height: 44px;
    background: var(--accent);
    border: none; border-radius: 8px;
    color: #0d0d0d;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #f08d40; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #3d1515; border: 1px solid #7a2020;
    color: #f8a0a0;
    font-family: var(--font-mono); font-size: 0.72rem;
    padding: 10px 18px; border-radius: 6px;
    opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">Doc<span>Mind</span></div>
  <div class="model-badge">▲ Llama 4 Scout · Groq</div>
</header>

<div class="main">

  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div class="panel-section">
      <div class="section-label">Document Source</div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('pdf')">📄 PDF</button>
        <button class="tab" onclick="switchTab('text')">✏️ Text</button>
      </div>

      <!-- PDF Tab -->
      <div id="tab-pdf">
        <div class="upload-zone" id="uploadZone"
          ondragover="handleDrag(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
          <input type="file" accept=".pdf" id="fileInput" onchange="handleFile(event)">
          <div class="upload-icon">📂</div>
          <div class="upload-text">Drop PDF here or click to browse</div>
          <div class="upload-sub">Max ~50 pages recommended</div>
        </div>
      </div>

      <!-- Text Tab -->
      <div id="tab-text" style="display:none">
        <textarea class="text-input-area" id="textInput"
          placeholder="Paste your paragraph or text here…"></textarea>
        <button class="load-btn" onclick="loadText()">Load Text →</button>
      </div>

      <div class="doc-status" id="docStatus">
        <div class="status-dot"></div>
        <div class="status-text" id="statusText">Document loaded</div>
      </div>
      <div class="doc-stats" id="docStats" style="display:none">
        <div class="stat">
          <div class="stat-num" id="wordCount">0</div>
          <div class="stat-label">Words</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="charCount">0</div>
          <div class="stat-label">Chars</div>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Session</div>
      <button class="load-btn" onclick="clearAll()"
        style="background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);">
        Clear Everything
      </button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" rows="1"
        placeholder="Ask a question about your document…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let documentText = '';
  let chatHistory  = [];
  let isLoading    = false;

  // ─── Tabs ─────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('tab-pdf').style.display  = tab === 'pdf'  ? 'block' : 'none';
    document.getElementById('tab-text').style.display = tab === 'text' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', (i===0 && tab==='pdf') || (i===1 && tab==='text'));
    });
  }

  // ─── PDF ──────────────────────────────────────────────
  function handleDrag(e)     { e.preventDefault(); document.getElementById('uploadZone').classList.add('drag-over'); }
  function handleDragLeave() { document.getElementById('uploadZone').classList.remove('drag-over'); }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f?.type === 'application/pdf') processPDF(f);
    else showToast('Please drop a valid PDF file.');
  }
  function handleFile(e) { if (e.target.files[0]) processPDF(e.target.files[0]); }

  async function processPDF(file) {
    const zone = document.getElementById('uploadZone');
    zone.querySelector('.upload-text').textContent = '⏳ Extracting text…';
    try {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const c    = await page.getTextContent();
        text += c.items.map(s => s.str).join(' ') + '\n\n';
      }
      documentText = text.trim();
      setDocumentLoaded(`${file.name} · ${pdf.numPages} pages`);
      zone.querySelector('.upload-text').textContent = `✓ ${file.name}`;
      chatHistory = [];
      renderChat();
    } catch(err) {
      zone.querySelector('.upload-text').textContent = 'Drop PDF here or click to browse';
      showToast('Failed to read PDF: ' + err.message);
    }
  }

  // ─── Text ─────────────────────────────────────────────
  function loadText() {
    const val = document.getElementById('textInput').value.trim();
    if (!val) { showToast('Please paste some text first.'); return; }
    documentText = val;
    setDocumentLoaded('Custom text loaded');
    chatHistory = [];
    renderChat();
  }

  function setDocumentLoaded(label) {
    document.getElementById('docStatus').classList.add('visible');
    document.getElementById('statusText').textContent = label;
    document.getElementById('docStats').style.display = 'flex';
    document.getElementById('wordCount').textContent = documentText.split(/\s+/).filter(Boolean).length.toLocaleString();
    document.getElementById('charCount').textContent = documentText.length.toLocaleString();
  }

  // ─── Chat ─────────────────────────────────────────────
  function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }

  async function sendMessage() {
    if (isLoading) return;
    if (!documentText) { showToast('Please load a document first.'); return; }
    const input    = document.getElementById('chatInput');
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    chatHistory.push({ role: 'user', content: question });
    renderChat();
    addTypingIndicator();

    try {
      const systemPrompt = `You are a precise document assistant. Answer questions strictly based on the provided document content. If the answer is not found in the document, say so clearly. Be concise and accurate.\n\n--- DOCUMENT CONTENT ---\n${documentText.slice(0, 28000)}\n--- END DOCUMENT ---`;

      // ✅ Calls our own Vercel serverless function — API key never exposed
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [
            { role: 'system', content: systemPrompt },
            ...chatHistory.slice(-8)
          ]
        })
      });

      removeTypingIndicator();

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');

      const reply = data.choices[0].message.content;
      chatHistory.push({ role: 'assistant', content: reply });
      renderChat();
    } catch(err) {
      removeTypingIndicator();
      showToast('Error: ' + err.message);
      chatHistory.pop();
      renderChat();
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
    }
  }

  function renderChat() {
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    if (!chatHistory.length) {
      container.innerHTML = documentText
        ? `<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">Document ready</div><div class="empty-sub">Ask your first question below.</div></div>`
        : `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Load a document to begin</div><div class="empty-sub">Upload a PDF or paste text on the left,<br>then ask anything about its contents.<br><br><span style="color:var(--accent)">Powered by Llama 4 Scout via Groq</span></div></div>`;
      return;
    }
    chatHistory.forEach(msg => {
      const div = document.createElement('div');
      div.className = `msg ${msg.role === 'user' ? 'user' : 'ai'}`;
      div.innerHTML = `<div class="msg-avatar">${msg.role==='user'?'U':'AI'}</div>
        <div class="msg-bubble">${escapeHtml(msg.content).replace(/\n/g,'<br>')}</div>`;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  }

  function addTypingIndicator() {
    const c = document.getElementById('chatMessages');
    const d = document.createElement('div');
    d.className = 'msg ai'; d.id = 'typingMsg';
    d.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-bubble"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
  }
  function removeTypingIndicator() { document.getElementById('typingMsg')?.remove(); }
  function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function clearAll() {
    documentText = ''; chatHistory = [];
    document.getElementById('textInput').value = '';
    document.getElementById('fileInput').value = '';
    document.querySelector('.upload-text').textContent = 'Drop PDF here or click to browse';
    document.getElementById('docStatus').classList.remove('visible');
    document.getElementById('docStats').style.display = 'none';
    renderChat();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  renderChat();
</script>
</body>
</html>
